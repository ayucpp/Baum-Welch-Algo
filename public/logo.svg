<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
  <!-- Network graph: 3 nodes connected by lines -->
  <!-- Top node -->
  <circle cx="50" cy="22" r="9" fill="#ffffff"/>
  <!-- Bottom-left node -->
  <circle cx="22" cy="72" r="9" fill="#ffffff"/>
  <!-- Bottom-right node -->
  <circle cx="78" cy="72" r="9" fill="#ffffff"/>
  <!-- Edges -->
  <line x1="50" y1="31" x2="22" y2="63" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="31" x2="78" y2="63" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  <line x1="31" y1="72" x2="69" y2="72" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
</svg>
